services:
  redis:
    image: redis:7-alpine
    container_name: buyorsell-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  quant-engine:
    build:
      context: .
      dockerfile: Dockerfile.quant
    image: ${IMAGE_QUANT:-buyorsell-quant-engine:local}
    container_name: buyorsell-quant
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  web-bff:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ${IMAGE_WEB:-buyorsell-web-bff:local}
    container_name: buyorsell-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QUANT_ENGINE_URL: http://quant-engine:8000
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      TELEGRAM_ALERT_WEBHOOK_URL: ${TELEGRAM_ALERT_WEBHOOK_URL:-}
      ZALO_OA_WEBHOOK_URL: ${ZALO_OA_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      quant-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
