name: BuyOrSell 4.0 CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_QUANT: ghcr.io/${{ github.repository }}/quant-engine
  IMAGE_WEB: ghcr.io/${{ github.repository }}/web-bff

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-quant.txt -r requirements-rag.txt

      - name: Run Python tests
        run: python -m unittest discover tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Check backend API and static app
        run: npm run check

      - name: Check Node syntax
        run: |
          node --check api/lib/redis-store.js
          node --check api/lib/rate-limit.js
          node --check api/lib/circuit-breaker.js
          node --check api/lib/alert-rules.js
          node --check api/alerts-evaluate.js
          node --check api/bff-dashboard.js
          node --check scripts/web-server.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck and build frontend
        working-directory: frontend
        run: npm run build

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for Quant
        id: meta-quant
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_QUANT }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Quant
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.quant
          push: true
          tags: ${{ steps.meta-quant.outputs.tags }}

      - name: Docker metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/buyorsell-4
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export IMAGE_QUANT="${{ env.IMAGE_QUANT }}:latest"
            export IMAGE_WEB="${{ env.IMAGE_WEB }}:latest"
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            wget --no-verbose --tries=6 --retry-connrefused --spider http://localhost:3000/api/health
            docker image prune -f
